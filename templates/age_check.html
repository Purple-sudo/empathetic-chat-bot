<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Age Verification - Empathetic Chatbot</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }
        
        .verification-container {
            max-width: 500px;
            width: 100%;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }
        
        .verification-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 2rem;
            text-align: center;
        }
        
        .verification-header h1 {
            margin: 0;
            font-size: 1.8rem;
            font-weight: 300;
        }
        
        .verification-header p {
            margin: 0.5rem 0 0 0;
            opacity: 0.9;
            font-size: 0.9rem;
        }
        
        .verification-body {
            padding: 2rem;
        }
        
        .form-group {
            margin-bottom: 1.5rem;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
            color: #333;
        }
        
        .form-control {
            width: 100%;
            padding: 0.75rem;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1rem;
            transition: border-color 0.3s;
        }
        
        .form-control:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .btn-submit {
            width: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            padding: 0.75rem;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            transition: transform 0.2s;
        }
        
        .btn-submit:hover {
            transform: scale(1.02);
        }
        
        .alert {
            padding: 0.75rem 1rem;
            border-radius: 8px;
            margin-bottom: 1rem;
        }
        
        .alert-danger {
            background-color: #fee;
            color: #c00;
            border: 1px solid #fcc;
        }
        
        .info-text {
            font-size: 0.85rem;
            color: #666;
            margin-top: 0.5rem;
        }
        
        .required {
            color: #c00;
        }
    </style>
    <script>
        // Set max date to 18 years ago
        window.onload = function() {
            const birthDateInput = document.getElementById('birth_date');
            const today = new Date();
            const maxDate = new Date(today.getFullYear() - 18, today.getMonth(), today.getDate());
            birthDateInput.max = maxDate.toISOString().split('T')[0];
        };
    </script>
</head>
<body>
    <div class="verification-container">
        <div class="verification-header">
            <h1>🔒 Age Verification</h1>
            <p>Please verify your age to continue</p>
        </div>
        
        <div class="verification-body">
            {% if error %}
            <div class="alert alert-danger">
                {{ error }}
            </div>
            {% endif %}
            
            <form method="POST" action="{{ url_for('age_check') }}">
                <div class="form-group">
                    <label for="birth_date">
                        Date of Birth <span class="required">*</span>
                    </label>
                    <input 
                        type="date" 
                        id="birth_date" 
                        name="birth_date" 
                        class="form-control" 
                        required
                    >
                    <div class="info-text">
                        You must be at least 18 years old to use this service.
                    </div>
                </div>
                
                <div class="form-group">
                    <label for="id_type">
                        Identification Type <span class="required">*</span>
                    </label>
                    <select id="id_type" name="id_type" class="form-control" required>
                        <option value="">Select identification type</option>
                        <option value="passport">Passport</option>
                        <option value="drivers_license">Driver's License</option>
                        <option value="national_id">National ID Card</option>
                        <option value="birth_certificate">Birth Certificate</option>
                        <option value="other">Other Government ID</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label for="id_number">
                        Identification Number <span class="required">*</span>
                    </label>
                    <input 
                        type="text" 
                        id="id_number" 
                        name="id_number" 
                        class="form-control" 
                        placeholder="Enter your ID number"
                        required
                    >
                    <div class="info-text">
                        This information is required for age verification purposes.
                    </div>
                </div>
                
                <button type="submit" class="btn-submit">Verify Age and Continue</button>
            </form>
        </div>
    </div>
</body>
</html>
