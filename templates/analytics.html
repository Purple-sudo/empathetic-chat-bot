<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analytics - Aria</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 2rem;
        }
        .card {
            border-radius: 16px;
            box-shadow: 0 16px 40px rgba(0,0,0,0.2);
            border: none;
        }
        .header {
            color: white;
            margin-bottom: 1rem;
        }
        .pill {
            display: inline-block;
            padding: 0.25rem 0.6rem;
            border-radius: 999px;
            background: #f1f3ff;
            margin: 0.25rem;
            font-size: 0.85rem;
        }
    </style>
</head>
<body>
    <div class="container" style="max-width: 900px;">
        <div class="header d-flex align-items-center justify-content-between">
            <div>
                <h2 class="mb-0">Conversation analytics</h2>
                <small>Emotion labels are internal-only; this page is for the app owner/user.</small>
            </div>
            <a class="btn btn-light" href="{{ url_for('index') }}">Back to chat</a>
        </div>

        <div class="card p-4">
            <div class="row g-3">
                <div class="col-md-4">
                    <div class="border rounded-3 p-3">
                        <div class="text-muted">Total messages stored</div>
                        <div class="fs-3" id="totalMessages">-</div>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="border rounded-3 p-3">
                        <div class="text-muted">Average intensity</div>
                        <div class="fs-3" id="avgIntensity">-</div>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="border rounded-3 p-3">
                        <div class="text-muted">Crisis-flagged messages</div>
                        <div class="fs-3" id="crisisCount">-</div>
                    </div>
                </div>
            </div>

            <hr />

            <h5 class="mb-2">Emotion counts (internal)</h5>
            <div id="emotionCounts"></div>
        </div>
    </div>

    <script>
        async function loadAnalytics() {
            const res = await fetch('/analytics');
            const data = await res.json();

            document.getElementById('totalMessages').textContent = data.total_messages ?? '-';
            document.getElementById('avgIntensity').textContent = data.avg_intensity ?? '-';
            document.getElementById('crisisCount').textContent = data.crisis_flagged_messages ?? '-';

            const container = document.getElementById('emotionCounts');
            container.innerHTML = '';
            const counts = data.emotion_counts || {};
            Object.keys(counts).sort().forEach((k) => {
                const pill = document.createElement('span');
                pill.className = 'pill';
                pill.textContent = `${k}: ${counts[k]}`;
                container.appendChild(pill);
            });
        }
        loadAnalytics().catch(console.error);
    </script>
</body>
</html>
